name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (saves CI minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  # Next.js build needs no real secrets for lint/typecheck/test.
  # Provide dummy values so build doesn't fail on missing env vars.
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder-publishable-key"
  SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
  OPENAI_API_KEY: "placeholder-openai-key"
  # Sentry SDK gracefully no-ops when DSN is empty, but provide dummy
  # values so withSentryConfig doesn't complain during build.
  NEXT_PUBLIC_SENTRY_DSN: ""
  SENTRY_DSN: ""
  DATALAB_API_KEY: "placeholder-datalab-key"

jobs:
  # ── Quality gate: lint + typecheck + unit tests ──────────────────────
  quality:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  # ── Build gate + E2E smoke: compile once, then boot the BUILT app ────
  # Smoke tests live in the build job so the production build happens
  # exactly once per run instead of twice.
  build:
    name: Next.js Build & E2E Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: E2E smoke tests
        run: npm run test:e2e
