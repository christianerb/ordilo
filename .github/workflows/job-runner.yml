name: Job Runner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    name: Trigger /api/jobs/run
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job runner
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.JOBS_RUNNER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": 10}' \
            "${{ vars.VERCEL_DEPLOYMENT_URL || 'https://ordilo-six.vercel.app' }}/api/jobs/run")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::warning::Job runner returned HTTP $http_code"
          fi
