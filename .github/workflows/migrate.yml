name: Supabase Migration

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry Run (zeigt SQL ohne Ausführung)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Cancel in-progress migration runs for the same ref
concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

env:
  # Project ref aus der Supabase URL (vrodyamhdxrspnaxzdtg.supabase.co)
  SUPABASE_PROJECT_REF: "vrodyamhdxrspnaxzdtg"

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dry run (show pending migrations)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migrations
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
